schema_version: 1
gateway:
  name: pocket-harness
  data_dir: ~/.pocket-harness
  log_level: info
  hot_reload:
    enabled: true
    poll_interval_ms: 1500
recovery:
  enabled: true
  on_invalid_config: keep_active
  on_connector_break: rollback_to_last_known_good
  write_rejection_report: true
  keep_history: 20
features:
  screenshots:
    enabled: true
  file_transfer:
    enabled: true
    max_bytes: 20971520
    allow_sensitive_paths: false
  terminal:
    enabled: true
    max_sessions: 4
    read_limit: 4000
  watch:
    enabled: true
    default_interval_seconds: 20
  queue:
    enabled: true
    max_depth: 20
  cancel:
    enabled: true
  history:
    enabled: true
    max_receipts: 200
  threads:
    enabled: true
  images:
    enabled: true
    max_images_per_message: 10
    max_bytes: 20971520
    retention_days: 7
  llm_router:
    enabled: false
mobile:
  telegram:
    enabled: false
    bot_token: $TELEGRAM_BOT_TOKEN
    allowed_users: []
    allowed_chats: []
    allow_group_chats: false
    reply_to_messages: false
    poll_timeout_seconds: 25
llm_router:
  enabled: false
  provider: openai_compatible
  base_url: https://api.openai.com/v1
  api_key: $OPENAI_API_KEY
  model: ''
  natural_commands: true
  polish_replies: true
connectors:
  default: echo
  definitions:
    echo:
      type: builtin_echo
      display_name: Echo
      command: []
      cwd: .
      timeout_seconds: 30
      env: {}
      settings: {}
threads:
  main:
    connector: null
    cwd: '~'
    watch:
      enabled: false
    queue:
      enabled: true
    reply_style: normal
